<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscribe - First Embrace</title>
<style>
  body { margin: 0; padding: 0; background: #FFFAF6; }
</style>
</head>
<body>
<div id="signup-wrapper" style="background:#FFFAF6; padding:48px 32px; border-radius:8px; font-family:Helvetica,Arial,sans-serif; max-width:800px; margin:0 auto; text-align:center;">
  <h2 style="color:#333; margin-top:0; font-size:36px; margin-bottom:32px;">Lead the fight for newborn survival</h2>

  <div style="max-width:500px; margin:0 auto; text-align:left;">
    <p style="font-size:18px; color:#333; margin:0 0 16px 0;">
      We communicate our work through our newsletter, transparently.
    </p>
    <p style="font-size:18px; color:#333; margin:0 0 32px 0;">
      Feedback is welcome by reply.
    </p>

    <form id="signup-form" novalidate>
      <label for="mce-EMAIL" style="display:block; font-size:20px; margin-bottom:10px; color:#333;">
        Email Address
      </label>
      <input type="email" name="EMAIL" id="mce-EMAIL" required
        style="width:100%; padding:14px; font-size:18px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; margin-bottom:10px;">
      <p style="font-size:16px; color:#888; margin:0 0 24px 0;">
        We will not share your data. You can unsubscribe anytime.
      </p>

      <!-- Honeypot: do not remove -->
      <div aria-hidden="true" style="position:absolute; left:-5000px;">
        <input type="text" name="b_4066ce1f99dfa9ae24ee87027_d2b4845008" tabindex="-1" value="">
      </div>

      <button type="submit" id="submit-btn"
        style="background:#9FC9F1; color:#000; padding:16px 40px; font-size:24px; font-weight:600; border:none; border-radius:4px; cursor:pointer;">
        Subscribe
      </button>
    </form>

    <div id="response-message" style="margin-top:24px; font-size:18px; display:none;"></div>
  </div>
</div>

<script>
  document.getElementById('signup-form').addEventListener('submit', function(e) {
    e.preventDefault();

    var email = document.getElementById('mce-EMAIL').value.trim();
    var honeypot = document.querySelector('input[name="b_4066ce1f99dfa9ae24ee87027_d2b4845008"]').value;
    var btn = document.getElementById('submit-btn');
    var msg = document.getElementById('response-message');

    if (!email) {
      msg.style.display = 'block';
      msg.style.color = '#c0392b';
      msg.textContent = 'Please enter your email address.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Subscribing...';

    var callbackName = 'mcCallback_' + Date.now();
    var url = 'https://firstembrace.us14.list-manage.com/subscribe/post-json?u=4066ce1f99dfa9ae24ee87027&id=d2b4845008&f_id=0041b4e5f0' +
              '&EMAIL=' + encodeURIComponent(email) +
              '&b_4066ce1f99dfa9ae24ee87027_d2b4845008=' + encodeURIComponent(honeypot) +
              '&c=' + callbackName;

    window[callbackName] = function(data) {
      msg.style.display = 'block';
      if (data.result === 'success') {
        msg.style.color = '#2e7d32';
        msg.textContent = 'Thank you! Please check your email to confirm.';
        document.getElementById('signup-form').style.display = 'none';
      } else {
        msg.style.color = '#c0392b';
        var tmp = document.createElement('div');
        tmp.innerHTML = data.msg || 'Something went wrong. Please try again.';
        msg.textContent = tmp.textContent;
        btn.disabled = false;
        btn.textContent = 'Subscribe';
      }
      delete window[callbackName];
      script.remove();
    };

    var script = document.createElement('script');
    script.src = url;
    script.onerror = function() {
      msg.style.display = 'block';
      msg.style.color = '#c0392b';
      msg.textContent = 'Network error. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Subscribe';
    };
    document.body.appendChild(script);
  });
</script>
</body>
</html>
